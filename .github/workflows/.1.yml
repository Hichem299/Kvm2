name: Build Kernel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            dwarves \
            cpio \
            kmod \
            clang \
            lld \
            llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu
          echo "deb http://http.kali.org/kali kali-rolling main contrib non-free" | sudo tee /etc/apt/sources.list.d/kali.list
          wget -q -O - https://archive.kali.org/archive-key.asc | sudo apt-key add -
          sudo apt update
          sudo apt install -y kali-linux-headless 2>/dev/null || true

      - name: Build Image
        run: |
          cp H/.config .config
          find . -type f \( -name Makefile -o -name '*.mk' \) \
            -exec sed -i '/auto\.conf/d;/syncconfig/d;/autoconf\.h/d' {} +
          grep -q 'CONFIG_FUNCTION_ALIGNMENT' .config || echo 'CONFIG_FUNCTION_ALIGNMENT=0' >> .config
          make -j$(($(nproc) * 6))

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image
