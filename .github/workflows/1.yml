name: Build Kernel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            dwarves \
            cpio \
            kmod \
            gcc-aarch64-linux-gnu \
            gcc-x86-64-linux-gnu \
            binutils-aarch64-linux-gnu \
            binutils-x86-64-linux-gnu \
            llvm \
            clang \
            lld

      - name: Build Image
        run: |
          # Copy your config
          cp H/.config .config || echo "Warning: No H/.config found"

          # Force LTO (GCC LTO if supported, fallback)
          ./scripts/config --enable LTO
          ./scripts/config --enable LTO_GCC || true
          ./scripts/config --disable CONFIG_FUSE_BPF || true   # Fix undefined reference
          ./scripts/config --disable FUSE_BPF || true

          # Clean and configure
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=x86_64-linux-gnu-gcc \
            HOSTCXX=x86_64-linux-gnu-g++ \
            olddefconfig

          # Extra prepare
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare -j$(nproc)

          # Your HID Samsung patch
          sed -i '/set_bit(EV_REP, hi->input->evbit);/d' drivers/hid/hid-samsung.c || true
          sed -i '/switch (usage->hid & HID_USAGE) {/i\        set_bit(EV_REP, hi->input->evbit);' drivers/hid/hid-samsung.c || true

          # Build with LTO forced + verbose
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=x86_64-linux-gnu-gcc \
            HOSTCXX=x86_64-linux-gnu-g++ \
            HOSTLD=x86_64-linux-gnu-ld \
            HOSTAR=x86_64-linux-gnu-ar \
            CC="aarch64-linux-gnu-gcc" \
            LD="aarch64-linux-gnu-ld" \
            AR="aarch64-linux-gnu-ar" \
            Image -j$(nproc) V=1 2>&1 | tee build.log

      - name: Check Build Log for Errors
        run: |
          if grep -q "Error\|undefined reference" build.log; then
            echo "Build failed, check log"
            exit 1
          fi

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: arch/arm64/boot/Image

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
