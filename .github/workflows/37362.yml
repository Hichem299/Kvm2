name: Build Kernel - Kali NetHunter

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev \
            libelf-dev libncurses-dev make \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang llvm lld

      - name: Build Image
        run: |
          cp H/.config .config
          find . -type f \( -name Makefile -o -name '*.mk' \) \
            -exec sed -i '/auto\.conf/d;/syncconfig/d;/autoconf\.h/d' {} +
          grep -q 'CONFIG_FUNCTION_ALIGNMENT' .config || echo 'CONFIG_FUNCTION_ALIGNMENT=0' >> .config
          find scripts/ -type f \( -name '*.o' -o -name '*.a' \) -delete
          find scripts/ -type f -not -name '*.*' -exec file {} \; | grep -i 'ARM\|aarch64\|ELF' | cut -d: -f1 | xargs -r rm -f
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               CC=aarch64-linux-gnu-gcc \
               LD=aarch64-linux-gnu-ld \
               -j$(($(nproc) * 6)) Image

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: arch/arm64/boot/Image
