name: Build Kernel - Kali NetHunter

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build inside arm64 container
        uses: addnab/docker-run-action@v3
        with:
          image: arm64v8/ubuntu:22.04
          options: --platform linux/arm64 -v ${{ github.workspace }}:/work
          run: |
            apt-get update -y
            apt-get install -y \
              build-essential bc bison flex libssl-dev \
              libelf-dev libncurses-dev make \
              clang llvm lld binutils
            cd /work
            cp H/.config .config
            find . -type f \( -name Makefile -o -name '*.mk' \) \
              -exec sed -i '/auto\.conf/d;/syncconfig/d;/autoconf\.h/d' {} +
            grep -q 'CONFIG_FUNCTION_ALIGNMENT' .config || echo 'CONFIG_FUNCTION_ALIGNMENT=0' >> .config
            find scripts/ -type f \( -name '*.o' -o -name '*.a' \) -delete
            make ARCH=arm64 \
                 CC=clang \
                 LD=ld.lld \
                 AR=llvm-ar \
                 NM=llvm-nm \
                 OBJCOPY=llvm-objcopy \
                 OBJDUMP=llvm-objdump \
                 STRIP=llvm-strip \
                 -j$(($(nproc) * 6)) Image

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: arch/arm64/boot/Image
