name: Build Kernel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            dwarves \
            cpio \
            kmod \
            gcc-aarch64-linux-gnu \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu
      - name: Fix permissions
        run: |
          chmod -R 755 .
          find . -name "*.sh" -exec chmod +x {} \;
          find . -name "Makefile" -exec chmod 644 {} \;
          find . -name "*.c" -exec chmod 644 {} \;
          find . -name "*.h" -exec chmod 644 {} \;
          find . -type l | while read link; do
            target=$(readlink "$link")
            if echo "$target" | grep -q "^/root/"; then
              new_target=$(echo "$target" | sed "s|^/root/|$HOME/|")
              ln -sf "$new_target" "$link"
            fi
          done

      - name: Build Image
        run: |
          export KBUILD_SYMTYPES=0
          export KMI_SYMBOL_LIST=
      

          cp H/.config .config
          
          export KBUILD_SYMTYPES=0
          export KMI_SYMBOL_LIST=
          make ARCH=arm64 CROSS_COMPILE=         aarch64-linux-gnu- \
            HOSTCC=x86_64-linux-gnu-gcc \
            HOSTCXX=x86_64-linux-gnu-g++ \
            HOSTLD=x86_64-linux-gnu-ld \
            HOSTAR=x86_64-linux-gnu-ar \
            -j$(($(nproc) * 6)) Image

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image
