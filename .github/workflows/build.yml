name: Build Kernel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            dwarves \
            cpio \
            kmod \
            gcc-aarch64-linux-gnu

      - name: Build Image
        run: |
          git clone https://github.com/Hichem299/Kvm2.git
          cd Kvm2
          make ARCH=arm64 olddefconfig
          make ARCH=arm64 prepare 
          make ARCH=arm64 Image -j$(nproc)

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image
